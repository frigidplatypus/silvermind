name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build web + desktop frontend
        run: |
          nix develop --command bash -c "
            pnpm install --frozen-lockfile
            pnpm build:web
            pnpm build:desktop
          "
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-web
          path: frontend/dist/
      - name: Upload desktop dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-desktop
          path: desktop/frontend/dist/

  sbtask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sbtask
        run: nix build '.#sbtask'
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sbtask
          path: result/bin/sbtask

  desktop:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Download desktop frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-desktop
          path: desktop/frontend/dist/
      - name: Build silvermind-desktop
        run: nix build '.#silvermind-desktop'
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: silvermind-desktop
          path: result/bin/silvermind-desktop
